spring.application.name=GGarciaProgramacionNCapasMavenCliente
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
server.tomcat.max-parameters=10000
server.tomcat.max-part-count=10000
server.port=8080
spring.profiles.default=dev

# URL base del proyecto de servicios (puede sobrescribirse por perfil/variable de entorno)
services.base-url=${SERVICES_BASE_URL:http://localhost:8081}

# Endpoints consumidos desde el cliente
services.endpoints.usuario=/api/usuario
services.endpoints.auth-login=/api/usuario/login
services.endpoints.rol=/api/rol
services.endpoints.pais=/api/pais
services.endpoints.direccion=/api/direccion
services.endpoints.estado=/api/estado
services.endpoints.municipio=/api/municipio
services.endpoints.colonia=/api/colonia


