<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <th:block th:replace="~{components/head :: recursos}"></th:block>
    <title>Iniciar sesion</title>
</head>

<body class="bg-light d-flex align-items-center" style="min-height: 100vh;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-6 col-lg-4">
                <div class="card shadow border-0 rounded-4">
                    <div class="card-body p-4 p-md-5">
                        <h4 class="text-center text-primary mb-4">Acceso al sistema</h4>

                        <div th:if="${param.error}" class="alert alert-danger py-2" role="alert">
                            Usuario o contrasena invalidos.
                        </div>
                        <div th:if="${param.logout}" class="alert alert-success py-2" role="alert">
                            Sesion cerrada correctamente.
                        </div>

                        <form th:action="@{/login}" method="post" autocomplete="off">
                            <div class="mb-3">
                                <label for="username" class="form-label">Usuario</label>
                                <input type="text" id="username" name="username" class="form-control" required>
                            </div>
                            <div class="mb-4">
                                <label for="password" class="form-label">Contrasena</label>
                                <input type="password" id="password" name="password" class="form-control" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Entrar</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
